name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install & Build Engine
        run: |
          cd engine
          npm install
          npm run build

      - name: Test Engine
        run: |
          cd engine
          npm test

      - name: Build CLI
        run: |
          cd cli
          npm install
          npm run build
